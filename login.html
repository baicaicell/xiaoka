<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>登录/注册 - 卡小帮</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "PingFang SC", "Microsoft YaHei", sans-serif; background: #f5f7fa; min-height: 100vh; display: flex; flex-direction: column; }

    header { width: 100%; height: 56px; display: flex; align-items: center; justify-content: space-between; padding: 0 16px; border-bottom: 1px solid #eee; background: #fff; }
    .brand span { font-size: 18px; font-weight: 600; }
    .back { font-size: 14px; color: #007bff; text-decoration: none; }

    .wrap { flex: 1; display: flex; justify-content: center; align-items: center; padding: 20px; }
    .card { background: #fff; border-radius: 12px; padding: 40px 32px; box-shadow: 0 2px 12px rgba(0,0,0,.06); width: 100%; max-width: 400px; }

    .tabs { display: flex; margin-bottom: 24px; border-bottom: 1px solid #eee; }
    .tab { flex: 1; text-align: center; padding: 10px; font-size: 15px; cursor: pointer; color: #888; border-bottom: 2px solid transparent; transition: all .2s; }
    .tab.active { color: #007bff; border-bottom-color: #007bff; font-weight: 500; }

    .form-group { margin-bottom: 16px; }
    .form-group label { display: block; font-size: 14px; font-weight: 500; color: #333; margin-bottom: 6px; }
    .form-group input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 15px; outline: none; transition: border-color .2s; }
    .form-group input:focus { border-color: #007bff; }

    .btn { width: 100%; padding: 12px; background: #007bff; color: #fff; border: none; border-radius: 8px; font-size: 16px; cursor: pointer; transition: background .2s; }
    .btn:hover { background: #0056b3; }

    .msg { margin-top: 16px; padding: 12px; border-radius: 8px; font-size: 14px; display: none; text-align: center; }
    .msg.success { display: block; background: #d4edda; color: #155724; }
    .msg.error { display: block; background: #f8d7da; color: #721c24; }

    .panel { display: none; }
    .panel.active { display: block; }

    @media (max-width: 480px) { .card { padding: 24px 20px; } }
  </style>
</head>
<body>
  <header>
    <div class="brand"><span>卡小帮</span></div>
    <a class="back" href="./index.html">返回首页</a>
  </header>

  <div class="wrap">
    <div class="card">
      <div class="tabs">
        <div class="tab active" onclick="switchTab('login')">登录</div>
        <div class="tab" onclick="switchTab('register')">注册</div>
      </div>

      <!-- 登录面板 -->
      <div class="panel active" id="loginPanel">
        <div class="form-group">
          <label>账户名</label>
          <input type="text" id="loginName" placeholder="请输入账户名">
        </div>
        <div class="form-group">
          <label>密码</label>
          <input type="password" id="loginPassword" placeholder="请输入密码">
        </div>
        <button class="btn" onclick="doLogin()">登录</button>
        <div class="msg" id="loginMsg"></div>
      </div>

      <!-- 注册面板 -->
      <div class="panel" id="registerPanel">
        <div class="form-group">
          <label>账户名</label>
          <input type="text" id="regName" placeholder="请输入账户名">
        </div>
        <div class="form-group">
          <label>手机号</label>
          <input type="tel" id="regPhone" placeholder="请输入手机号" maxlength="11">
        </div>
        <div class="form-group">
          <label>密码</label>
          <input type="password" id="regPassword" placeholder="请输入密码（至少6位）">
        </div>
        <button class="btn" onclick="doRegister()">提交注册</button>
        <div class="msg" id="regMsg"></div>
      </div>
    </div>
  </div>

  <script>
    function switchTab(tab) {
      document.querySelectorAll('.tab').forEach((t, i) => {
        t.classList.toggle('active', (tab === 'login' && i === 0) || (tab === 'register' && i === 1));
      });
      document.getElementById('loginPanel').classList.toggle('active', tab === 'login');
      document.getElementById('registerPanel').classList.toggle('active', tab === 'register');
    }

    async function doLogin() {
      const name = document.getElementById('loginName').value.trim();
      const password = document.getElementById('loginPassword').value.trim();
      const msgEl = document.getElementById('loginMsg');

      if (!name) { showMsg(msgEl, 'error', '请输入账户名'); return; }
      if (!password) { showMsg(msgEl, 'error', '请输入密码'); return; }

      try {
        const res = await fetch('./api/user_check.php', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name, password })
        });
        const data = await res.json();

        if (data.code === 200) {
          localStorage.setItem('user_phone', data.data.phone);
          localStorage.setItem('user_name', data.data.name);
          localStorage.setItem('user_points', data.data.points);
          localStorage.setItem('user_goldBeans', data.data.goldBeans);
          localStorage.setItem('user_isMerchant', data.data.isMerchant);
          showMsg(msgEl, 'success', '登录成功，正在跳转...');
          setTimeout(() => {
            const from = new URLSearchParams(location.search).get('from');
            location.href = from || './index.html';
          }, 1000);
        } else {
          showMsg(msgEl, 'error', data.msg);
        }
      } catch (err) {
        showMsg(msgEl, 'error', '网络错误，请重试');
      }
    }

    async function doRegister() {
      const name = document.getElementById('regName').value.trim();
      const phone = document.getElementById('regPhone').value.trim();
      const password = document.getElementById('regPassword').value.trim();
      const msgEl = document.getElementById('regMsg');

      if (!name) { showMsg(msgEl, 'error', '请输入账户名'); return; }
      if (!phone || phone.length !== 11) { showMsg(msgEl, 'error', '请输入正确的11位手机号'); return; }
      if (!password || password.length < 6) { showMsg(msgEl, 'error', '密码不能少于6位'); return; }

      try {
        const res = await fetch('./api/user_register.php', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ phone, name, password })
        });
        const data = await res.json();

        if (data.code === 200) {
          localStorage.setItem('user_phone', phone);
          localStorage.setItem('user_name', name);
          localStorage.setItem('user_points', '0');
          localStorage.setItem('user_goldBeans', '0');
          localStorage.setItem('user_isMerchant', 'false');
          showMsg(msgEl, 'success', '注册成功，正在跳转...');
          setTimeout(() => {
            const from = new URLSearchParams(location.search).get('from');
            location.href = from || './index.html';
          }, 1000);
        } else {
          showMsg(msgEl, 'error', data.msg);
        }
      } catch (err) {
        showMsg(msgEl, 'error', '网络错误，请重试');
      }
    }

    function showMsg(el, type, text) {
      el.className = 'msg ' + type;
      el.textContent = text;
      el.style.display = 'block';
    }

    document.getElementById('loginName').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
    document.getElementById('loginPassword').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
    document.getElementById('regPassword').addEventListener('keydown', e => { if (e.key === 'Enter') doRegister(); });
  </script>
</body>
</html>
