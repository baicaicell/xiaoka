<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>消息 - 卡小帮</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "PingFang SC", "Microsoft YaHei", sans-serif; background: #f5f7fa; min-height: 100vh; display: flex; flex-direction: column; }

    header { width: 100%; height: 56px; display: flex; align-items: center; justify-content: space-between; padding: 0 16px; border-bottom: 1px solid #eee; background: #fff; position: sticky; top: 0; z-index: 10; }
    .brand span { font-size: 18px; font-weight: 600; }
    .header-links { display: flex; gap: 12px; }
    .header-links a { font-size: 14px; color: #007bff; text-decoration: none; }

    .container { max-width: 600px; margin: 0 auto; padding: 16px; flex: 1; width: 100%; display: flex; flex-direction: column; }

    /* 聊天列表 */
    .chat-list { display: flex; flex-direction: column; gap: 8px; }
    .chat-item { background: #fff; border-radius: 10px; padding: 14px 16px; box-shadow: 0 1px 4px rgba(0,0,0,.04); display: flex; align-items: center; cursor: pointer; transition: background .2s; }
    .chat-item:hover { background: #f0f7ff; }
    .chat-item .avatar { width: 42px; height: 42px; border-radius: 50%; background: #007bff; color: #fff; display: flex; align-items: center; justify-content: center; font-size: 16px; font-weight: 600; margin-right: 12px; flex-shrink: 0; }
    .chat-item .info { flex: 1; min-width: 0; }
    .chat-item .name { font-size: 15px; font-weight: 500; color: #222; }
    .chat-item .last-msg { font-size: 13px; color: #888; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 2px; }
    .chat-item .meta { text-align: right; flex-shrink: 0; margin-left: 10px; }
    .chat-item .time { font-size: 11px; color: #aaa; }
    .chat-item .unread { display: inline-block; background: #dc3545; color: #fff; font-size: 11px; border-radius: 50%; width: 18px; height: 18px; line-height: 18px; text-align: center; margin-top: 4px; }

    /* 对话界面 */
    .chat-view { display: none; flex-direction: column; flex: 1; }
    .chat-view.active { display: flex; }
    .chat-header { display: flex; align-items: center; padding: 12px 0; border-bottom: 1px solid #eee; margin-bottom: 12px; }
    .chat-header .back-btn { font-size: 20px; cursor: pointer; margin-right: 12px; color: #007bff; background: none; border: none; }
    .chat-header .chat-name { font-size: 16px; font-weight: 600; }

    .messages { flex: 1; overflow-y: auto; padding: 10px 0; display: flex; flex-direction: column; gap: 10px; max-height: calc(100vh - 240px); }
    .msg-item { display: flex; align-items: flex-end; gap: 8px; max-width: 80%; }
    .msg-item.mine { align-self: flex-end; flex-direction: row-reverse; }
    .msg-bubble { padding: 10px 14px; border-radius: 12px; font-size: 14px; line-height: 1.5; word-break: break-all; }
    .msg-item.other .msg-bubble { background: #fff; color: #333; border: 1px solid #eee; }
    .msg-item.mine .msg-bubble { background: #007bff; color: #fff; }
    .msg-time { font-size: 11px; color: #aaa; margin-top: 2px; }
    .msg-item.mine .msg-time { text-align: right; }

    .input-bar { display: flex; gap: 8px; padding: 12px 0; border-top: 1px solid #eee; margin-top: auto; }
    .input-bar input { flex: 1; padding: 10px 14px; border: 1px solid #ddd; border-radius: 20px; font-size: 14px; outline: none; }
    .input-bar input:focus { border-color: #007bff; }
    .input-bar button { padding: 10px 20px; background: #007bff; color: #fff; border: none; border-radius: 20px; font-size: 14px; cursor: pointer; }
    .input-bar button:hover { background: #0056b3; }

    .empty { text-align: center; color: #888; padding: 60px 0; font-size: 14px; }

    .list-view { display: block; }
    .list-view.hidden { display: none; }
  </style>
</head>
<body>
  <header>
    <div class="brand"><span>💬 消息</span></div>
    <div class="header-links">
      <a href="./shop.html">商城</a>
      <a href="./index.html">首页</a>
    </div>
  </header>

  <div class="container">
    <!-- 聊天列表 -->
    <div class="list-view" id="listView">
      <div class="chat-list" id="chatList">
        <div class="empty">暂无消息</div>
      </div>
    </div>

    <!-- 对话界面 -->
    <div class="chat-view" id="chatView">
      <div class="chat-header">
        <button class="back-btn" onclick="backToList()">←</button>
        <span class="chat-name" id="chatTargetName"></span>
      </div>
      <div class="messages" id="messageList"></div>
      <div class="input-bar">
        <input type="text" id="msgInput" placeholder="输入消息..." onkeydown="if(event.key==='Enter')sendMsg()">
        <button onclick="sendMsg()">发送</button>
      </div>
    </div>
  </div>

  <script>
    const userPhone = localStorage.getItem('user_phone');
    if (!userPhone) location.href = './login.html?from=chat.html';

    let currentTarget = '';
    let refreshTimer = null;

    // 检查URL参数，是否直接打开某个对话
    const urlParams = new URLSearchParams(location.search);
    const targetPhone = urlParams.get('to');
    const targetName = urlParams.get('name');

    if (targetPhone) {
      openChat(targetPhone, targetName || targetPhone);
    } else {
      loadChatList();
    }

    async function loadChatList() {
      try {
        const res = await fetch(`./api/chat.php?phone=${userPhone}`);
        const data = await res.json();
        if (data.code === 200) renderChatList(data.data);
      } catch(e) {}
    }

    function renderChatList(list) {
      const el = document.getElementById('chatList');
      if (list.length === 0) { el.innerHTML = '<div class="empty">暂无消息，去商城购物时可联系商家</div>'; return; }
      el.innerHTML = list.map(c => `
        <div class="chat-item" onclick="openChat('${c.phone}','${c.name}')">
          <div class="avatar">${c.name.charAt(0)}</div>
          <div class="info">
            <div class="name">${c.name}</div>
            <div class="last-msg">${c.lastMsg}</div>
          </div>
          <div class="meta">
            <div class="time">${c.lastTime.slice(5,16)}</div>
            ${c.unread > 0 ? `<div class="unread">${c.unread}</div>` : ''}
          </div>
        </div>
      `).join('');
    }

    function openChat(phone, name) {
      currentTarget = phone;
      document.getElementById('chatTargetName').textContent = name;
      document.getElementById('listView').classList.add('hidden');
      document.getElementById('chatView').classList.add('active');
      loadMessages();
      // 每3秒刷新消息
      refreshTimer = setInterval(loadMessages, 3000);
    }

    function backToList() {
      currentTarget = '';
      document.getElementById('listView').classList.remove('hidden');
      document.getElementById('chatView').classList.remove('active');
      if (refreshTimer) { clearInterval(refreshTimer); refreshTimer = null; }
      loadChatList();
    }

    async function loadMessages() {
      if (!currentTarget) return;
      try {
        const res = await fetch(`./api/chat.php?phone=${userPhone}&target=${currentTarget}`);
        const data = await res.json();
        if (data.code === 200) renderMessages(data.data);
      } catch(e) {}
    }

    function renderMessages(msgs) {
      const el = document.getElementById('messageList');
      if (msgs.length === 0) { el.innerHTML = '<div class="empty">暂无消息，发送第一条吧</div>'; return; }
      el.innerHTML = msgs.map(m => {
        const isMine = m.from === userPhone;
        return `
          <div class="msg-item ${isMine ? 'mine' : 'other'}">
            <div>
              <div class="msg-bubble">${escapeHtml(m.content)}</div>
              <div class="msg-time">${m.time.slice(5,16)}</div>
            </div>
          </div>
        `;
      }).join('');
      el.scrollTop = el.scrollHeight;
    }

    async function sendMsg() {
      const input = document.getElementById('msgInput');
      const content = input.value.trim();
      if (!content) return;

      try {
        const res = await fetch('./api/chat.php', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ from: userPhone, to: currentTarget, content })
        });
        const data = await res.json();
        if (data.code === 200) {
          input.value = '';
          loadMessages();
        } else {
          alert(data.msg);
        }
      } catch(e) { alert('发送失败'); }
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }
  </script>
</body>
</html>
