<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>通知 - 卡小帮</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "PingFang SC", "Microsoft YaHei", sans-serif; background: #f5f7fa; min-height: 100vh; }

    header { width: 100%; height: 56px; display: flex; align-items: center; justify-content: space-between; padding: 0 16px; border-bottom: 1px solid #eee; background: #fff; position: sticky; top: 0; z-index: 10; }
    .brand span { font-size: 18px; font-weight: 600; }
    .header-links { display: flex; gap: 12px; }
    .header-links a { font-size: 14px; color: #007bff; text-decoration: none; }
    .mark-all { font-size: 13px; color: #007bff; cursor: pointer; border: none; background: none; }

    .container { max-width: 700px; margin: 24px auto; padding: 0 16px; }

    .notify-list { display: flex; flex-direction: column; gap: 10px; }
    .notify-item { background: #fff; border-radius: 10px; padding: 14px 18px; box-shadow: 0 1px 6px rgba(0,0,0,.04); border-left: 4px solid #007bff; }
    .notify-item.unread { border-left-color: #dc3545; background: #fff8f8; }
    .notify-item .title { font-size: 15px; font-weight: 600; color: #222; margin-bottom: 4px; }
    .notify-item .content { font-size: 13px; color: #555; margin-bottom: 4px; }
    .notify-item .time { font-size: 12px; color: #aaa; }

    .empty { text-align: center; color: #888; padding: 60px 0; font-size: 15px; }
  </style>
</head>
<body>
  <header>
    <div class="brand"><span>🔔 通知</span></div>
    <div class="header-links">
      <button class="mark-all" onclick="markAllRead()">全部已读</button>
      <a href="./shop.html">商城</a>
      <a href="./index.html">首页</a>
    </div>
  </header>

  <div class="container">
    <div class="notify-list" id="notifyList">
      <div class="empty">加载中...</div>
    </div>
  </div>

  <script>
    const userPhone = localStorage.getItem('user_phone');
    if (!userPhone) location.href = './login.html?from=notify.html';

    async function loadNotify() {
      try {
        const res = await fetch(`./api/notify.php?phone=${userPhone}`);
        const data = await res.json();
        if (data.code === 200) render(data.data);
      } catch(e) {
        document.getElementById('notifyList').innerHTML = '<div class="empty">加载失败</div>';
      }
    }

    function render(list) {
      const el = document.getElementById('notifyList');
      if (list.length === 0) { el.innerHTML = '<div class="empty">暂无通知</div>'; return; }
      el.innerHTML = list.map(n => `
        <div class="notify-item ${n.read ? '' : 'unread'}">
          <div class="title">${n.title}</div>
          <div class="content">${n.content}</div>
          <div class="time">${n.time}</div>
        </div>
      `).join('');
    }

    async function markAllRead() {
      try {
        await fetch('./api/notify.php', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ action: 'read', phone: userPhone, notifyId: 'all' })
        });
        loadNotify();
      } catch(e) {}
    }

    loadNotify();
  </script>
</body>
</html>
